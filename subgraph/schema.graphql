type Org @entity(immutable: false) {
  id: ID!
  creator: Bytes!
  membership: Bytes!
  governor: Bytes!
  name: String!
  symbol: String!
  metadataURI: String!
  joinPolicy: Int!
  createdAt: BigInt!
  memberCount: Int!
  proposals: [Proposal!]! @derivedFrom(field: "org")
  members: [Member!]! @derivedFrom(field: "org")
  votes: [Vote!]! @derivedFrom(field: "org")
}

type Proposal @entity(immutable: false) {
  id: ID!
  org: Org!
  proposer: Bytes!
  startBlock: BigInt!
  endBlock: BigInt!
  proposalBody: String!
  state: Int!
  canceledAt: BigInt
  eta: BigInt
  executedAt: BigInt
  createdAt: BigInt!
  votesFor: BigInt!
  votesAgainst: BigInt!
  votesAbstain: BigInt!
  votes: [Vote!]! @derivedFrom(field: "proposal")
}

type Member @entity(immutable: false) {
  id: ID!
  org: Org!
  address: Bytes!
  tokenId: BigInt!
  mintedAt: BigInt!
  burnedAt: BigInt
  active: Boolean!
}

type Vote @entity(immutable: true) {
  id: ID!
  proposal: Proposal!
  org: Org!
  voter: Bytes!
  support: Int!
  weight: BigInt!
  reason: String
  blockNumber: BigInt!
  castAt: BigInt!
}

type RecoveryDelegate @entity(immutable: false) {
  id: ID!
  user: Bytes!
  delegate: Bytes!
  addedAt: BigInt!
  removedAt: BigInt
  active: Boolean!
}

type Sponsorship @entity(immutable: true) {
  id: ID!
  user: Bytes!
  target: Bytes!
  selector: Bytes!
  kind: Int!
  actualGasCost: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

type PaymasterStatus @entity(immutable: false) {
  id: ID!
  paused: Boolean!
  policySigner: Bytes!
  totalDeposited: BigInt!
  totalWithdrawn: BigInt!
  totalSponsored: BigInt!
  updatedAt: BigInt!
}

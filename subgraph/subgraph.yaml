specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: OrgFactory
    network: sepolia
    source:
      address: "0xE8D76d1D192c54493C81eB0C8bAbbCD98ad785ea"
      abi: OrgFactory
      startBlock: 10876189
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - Org
      abis:
        - name: OrgFactory
          file: ./abis/OrgFactory.json
      eventHandlers:
        - event: OrgCreated(indexed address,address,address,string)
          handler: handleOrgCreated
      file: ./src/mappings.ts
  - kind: ethereum
    name: RecoveryRegistry
    network: sepolia
    source:
      address: "0x3faCd12FeE4B242cAaBD01315C42d840fb75010d"
      abi: RecoveryRegistry
      startBlock: 10876189
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - RecoveryDelegate
      abis:
        - name: RecoveryRegistry
          file: ./abis/RecoveryRegistry.json
      eventHandlers:
        - event: DelegatesSet(indexed address,address[],uint8)
          handler: handleDelegatesSet
      file: ./src/mappings.ts
  - kind: ethereum
    name: Paymaster
    network: sepolia
    source:
      address: "0x9a2014ad25159faF44736CaAba6F8a49477766A4"
      abi: Paymaster
      startBlock: 10876189
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - Sponsorship
        - PaymasterStatus
      abis:
        - name: Paymaster
          file: ./abis/Paymaster.json
      eventHandlers:
        - event: Sponsored(indexed address,indexed address,bytes4,uint8,uint256)
          handler: handleSponsored
        - event: Funded(indexed address,uint256,uint256)
          handler: handleFunded
        - event: Withdrawn(indexed address,uint256)
          handler: handleWithdrawn
        - event: PausedSet(bool)
          handler: handlePausedSet
        - event: PolicySignerSet(indexed address)
          handler: handlePolicySignerSet
      file: ./src/mappings.ts
templates:
  - kind: ethereum
    name: MembershipNFT
    network: sepolia
    source:
      abi: MembershipNFT
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - Member
        - Org
      abis:
        - name: MembershipNFT
          file: ./abis/MembershipNFT.json
      eventHandlers:
        - event: MemberJoined(indexed address,uint256)
          handler: handleMemberJoined
        - event: MemberRemoved(indexed address,uint256)
          handler: handleMemberRemoved
      file: ./src/mappings.ts
  - kind: ethereum
    name: OrgGovernor
    network: sepolia
    source:
      abi: OrgGovernor
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - Proposal
        - Vote
        - Org
      abis:
        - name: OrgGovernor
          file: ./abis/OrgGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: ProposalCanceled(uint256)
          handler: handleProposalCanceled
        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
      file: ./src/mappings.ts
